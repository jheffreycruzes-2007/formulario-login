<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="multimedia/img/icono.png" type="image/x-icon">
    <link rel="stylesheet" href="css/formulario.css">
    <title>Formularios</title>
</head>

<body>

    <section>

        <h2>Login</h2>

        <form action="" class="formulario">

            <div class="campo">
                <label for="correo">Correo:</label>
                <input type="email" id="correo" name="correo" placeholder="Ingrese su correo" required>
            </div>

            <div class="campo">
                <label for="clave">Contraseña:</label>
                <input type="password" id="clave" name="clave" placeholder="Ingrese su contraseña" required>
            </div>

            <div class="campo">
                <input type="submit" value="Ingresar">
                <input type="reset" value="Limpiar">
            </div>

        </form>

    </section>

    <hr>

    <section>

        <h2>Contáctenos</h2>

        <form action="" class="formulario">

            <div class="campo">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ingrese su nombre" required>
            </div>

            <div class="campo">
                <label for="correo2">Correo:</label>
                <input type="email" id="correo2" name="correo" placeholder="Ingrese su correo" required>
            </div>

            <div class="campo">
                <label for="telefono">Teléfono:</label>
                <input type="number" id="telefono" name="telefono" placeholder="Ingrese su teléfono" required>
            </div>

            <div class="campo">
                <label for="asunto">Asunto:</label>
                <select id="asunto" name="asunto">
                    <option value="">Seleccione una opción</option>
                    <option value="Información">Información</option>
                    <option value="Soporte">Soporte</option>
                    <option value="Queja">Queja</option>
                </select>
            </div>

            <div class="campo">
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" rows="5" cols="40"></textarea>
            </div>

            <div class="campo">
                <label for="archivo">Adjuntar archivo:</label>
                <input type="file" id="archivo" name="archivo">
            </div>

            <div class="campo">
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpiar">
            </div>

        </form>

    </section>

</body>

</html>
